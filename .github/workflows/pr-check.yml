name: PR checks
on:
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: python -m pip install --upgrade pip && pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Tests
        run: pytest -q
